<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Registration - Hospital Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container { max-width: 400px; margin: 100px auto; }
    .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; }
    .btn-auth { width: 100%; padding: 14px; background: var(--accent-primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-auth:hover { background: #059669; transform: translateY(-2px); }
    .auth-footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 0.9rem; }
    .auth-footer a { color: var(--accent-primary); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body class="medical-theme">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Register as a new patient</p>
      </div>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="username" placeholder="Your account username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-auth">Register Now</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="patient-login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role: 'patient' })
        });
        const data = await res.json();
        if (data.success) {
          alert('Registration successful! Please login.');
          window.location.href = 'patient-login.html';
        } else {
          alert('Error: ' + data.error);
        }
      } catch (err) {
        alert('Registration failed. Please try again.');
      }
    });
  </script>
</body>
</html>
