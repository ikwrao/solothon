<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Portal - City District Hospital</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #f1f5f9; }
    .auth-container { max-width: 400px; margin: 100px auto; padding: 20px; }
    .glass-card { background: white; padding: 40px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border-top: 6px solid #334155; }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header h1 { color: #334155; font-weight: 800; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; }
    .btn-auth { width: 100%; padding: 14px; background: #334155; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-auth:hover { background: #1e293b; transform: translateY(-2px); }
    .info-strip { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="glass-card">
      <div class="auth-header">
        <h1>Staff Entrance</h1>
        <p>Doctors & Administrators Only</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>Staff ID / Username</label>
          <input type="text" id="username" placeholder="Enter your ID" required>
        </div>
        <div class="form-group">
          <label>Passcode</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-auth">Access Dashboard</button>
      </form>
      <div class="info-strip">
        This is a restricted area. Authorized staff only.
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          if (data.role === 'doctor' || data.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            alert('Access Denied: Please use the Patient Portal.');
            window.location.href = '/';
          }
        } else {
          alert('Login failed: ' + data.error);
        }
      } catch (err) {
        alert('Server unreachable. Try again later.');
      }
    });
  </script>
</body>
</html>
